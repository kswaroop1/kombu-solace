name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "[0-9]*.[0-9]*.[0-9]*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing tag to create or update as a GitHub Release"
        required: false
        default: ""
        type: string
      publish_to:
        description: "Optional package index for a manual dry-run publish"
        required: true
        default: "none"
        type: choice
        options:
          - "none"
          - "testpypi"

permissions:
  contents: read

jobs:
  build:
    name: Build and validate package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
          python -m pip install --upgrade build twine

      - name: Check tag matches package version
        if: github.event_name == 'release' || github.event_name == 'push' || inputs.release_tag != ''
        env:
          RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import tomllib

          with open("pyproject.toml", "rb") as fh:
              version = tomllib.load(fh)["project"]["version"]

          tag = os.environ["RELEASE_TAG"]
          allowed = {version, f"v{version}"}
          if tag not in allowed:
              raise SystemExit(
                  f"Release tag {tag!r} does not match pyproject version {version!r}. "
                  f"Use tag {version!r} or v{version!r}."
              )
          PY

      - name: Run unit tests
        run: python -m pytest tests/unit -q

      - name: Build source distribution and wheel
        run: python -m build --sdist --wheel

      - name: Validate package metadata
        run: python -m twine check dist/*

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/*
          if-no-files-found: error

  attach-github-release-assets:
    name: Attach artifacts to GitHub Release
    needs: build
    if: github.event_name == 'release' || github.event_name == 'push' || inputs.release_tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist

      - name: Upload distributions to release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* \
              --title "$RELEASE_TAG" \
              --generate-notes
          fi

  publish-testpypi:
    name: Publish package to TestPyPI
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.publish_to == 'testpypi'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write

    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish package to PyPI
    needs:
      - build
      - attach-github-release-assets
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
